<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ACEITAÊ</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }

        .topbar {
            background: #1A237E;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .produtos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
            gap: 20px;
            padding: 20px;
        }

        .produto-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            background: #00C853;
            border: none;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- TOPO -->
<div class="topbar" id="topBar">
    <div>ACEITAÊ</div>

    <div>
        <button id="btnEntrar" onclick="location.href='login.html'">Entrar</button>
        <button id="btnCadastrar" onclick="location.href='cadastro.html'">Cadastrar</button>
    </div>
</div>

<!-- BUSCA -->
<div style="padding:20px;">
    <input type="text" id="searchInput" placeholder="Buscar..." oninput="filtrarProdutos()">
</div>

<!-- INFO -->
<div style="padding:0 20px;">
    Total: <span id="total-produtos">0</span>
</div>

<!-- PRODUTOS -->
<div id="produtos"></div>

<script>
const API_URL = 'https://aceitae-api.onrender.com';

const token = localStorage.getItem('access_token');
const usuarioNome = localStorage.getItem('usuario_nome');
const usuarioTipo = localStorage.getItem('usuario_tipo');

if (usuarioTipo === 'vendedor') {
    window.location.href = 'vendedor.html';
}

let produtosOriginais = [];
let termoBusca = '';

function atualizarTopBar() {
    if (usuarioNome) {
        document.getElementById('btnCadastrar').style.display = 'none';
        document.getElementById('btnEntrar').style.display = 'none';

        const userDiv = document.createElement('div');
        userDiv.innerHTML = `
            Olá, ${usuarioNome}
            <button onclick="logout()">Sair</button>
        `;

        document.getElementById('topBar').appendChild(userDiv);
    }
}

function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
}

async function carregarProdutos() {
    try {
        const response = await fetch(`${API_URL}/produtos?status=aprovado`);
        const data = await response.json();

        produtosOriginais = data.produtos || [];
        aplicarFiltros();

    } catch {
        document.getElementById('produtos').innerHTML = 'Erro ao carregar';
    }
}

function aplicarFiltros() {
    let produtos = [...produtosOriginais];

    if (termoBusca) {
        produtos = produtos.filter(p =>
            p.nome.toLowerCase().includes(termoBusca.toLowerCase())
        );
    }

    document.getElementById('total-produtos').textContent = produtos.length;
    renderizarProdutos(produtos);
}

function renderizarProdutos(produtos) {
    const container = document.getElementById('produtos');

    if (!produtos.length) {
        container.innerHTML = 'Nenhum produto';
        return;
    }

    container.innerHTML = '<div class="produtos-grid"></div>';
    const grid = container.querySelector('.produtos-grid');

    produtos.forEach(produto => {
        const card = document.createElement('div');
        card.className = 'produto-card';

        card.innerHTML = `
            <h3>${produto.nome}</h3>
            <p>${produto.categoria}</p>
            <p>R$ ${produto.valor_exposicao}</p>

            <input type="number" id="valor-${produto.id}" placeholder="Sua oferta">
            <button onclick="fazerOferta(${produto.id})">Ofertar</button>
        `;

        grid.appendChild(card);
    });
}

async function fazerOferta(produtoId) {
    const token = localStorage.getItem('access_token');

    if (!token) {
        alert('Faça login!');
        window.location.href = 'login.html';
        return;
    }

    const valor = parseFloat(document.getElementById(`valor-${produtoId}`).value);

    if (!valor) return;

    const response = await fetch(`${API_URL}/ofertas`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({
            produto_id: produtoId,
            valor: valor
        })
    });

    const data = await response.json();
    alert(data.mensagem || 'Resposta recebida');
}

function filtrarProdutos() {
    termoBusca = document.getElementById('searchInput').value;
    aplicarFiltros();
}

atualizarTopBar();
carregarProdutos();
</script>

</body>
</html>
