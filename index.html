<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACEITAÊ - Faça a oferta. Torça pelo ACEITAÊ!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .topbar { background: #1A237E; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; }
        .logo span { color: #00C853; }
        .topbar-buttons { display: flex; gap: 10px; }
        .topbar-buttons button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-entrar { background: transparent; border: 1px solid white !important; color: white; }
        .btn-cadastrar { background: #00C853; color: white; }
        .btn-sair { background: #c62828; color: white; }
        .search-box { padding: 20px; }
        .search-box input { width: 100%; max-width: 500px; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        .info { padding: 0 20px 10px; color: #666; }
        .produtos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .produto-card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .produto-card h3 { color: #1A237E; margin-bottom: 8px; }
        .categoria { color: #999; font-size: 12px; margin-bottom: 8px; }
        .preco { font-size: 22px; font-weight: bold; color: #00C853; margin: 10px 0; }
        .input-group { display: flex; gap: 8px; margin-top: 12px; }
        .input-group input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-ofertar { background: #00C853; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn-ofertar:hover { background: #00A844; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .footer { background: #1A237E; color: white; text-align: center; padding: 20px; margin-top: 40px; }
        @media (max-width: 768px) { .produtos-grid { grid-template-columns: 1fr; } .topbar { flex-direction: column; } }
    </style>
</head>
<body>

<div class="topbar" id="topBar">
    <div class="logo">ACEIT<span>AÊ</span></div>
    <div class="topbar-buttons" id="topBarButtons">
        <button class="btn-entrar" onclick="location.href='login.html'">Entrar</button>
        <button class="btn-cadastrar" onclick="location.href='cadastro.html'">Cadastrar</button>
    </div>
</div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Buscar produtos..." oninput="filtrarProdutos()">
</div>

<div class="info">
    <span id="total-produtos">0</span> produtos encontrados
</div>

<div id="produtos" class="loading">Carregando produtos...</div>

<div class="footer">
    <p>ACEITAÊ - Você oferta, o vendedor decide, a gente garante.</p>
    <p style="font-size: 12px; margin-top: 10px;">© 2026 ACEITAÊ</p>
</div>

<script>
const API_URL = 'https://aceitae-api.onrender.com';

const token = localStorage.getItem('access_token');
const usuarioNome = localStorage.getItem('usuario_nome');
const usuarioTipo = localStorage.getItem('usuario_tipo');

// Vendedor vai para o painel
if (usuarioTipo === 'vendedor') {
    window.location.href = 'vendedor.html';
}

let produtosOriginais = [];
let termoBusca = '';

function atualizarTopBar() {
    if (usuarioNome) {
        const div = document.getElementById('topBarButtons');
        div.innerHTML = `
            <span style="display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-user-circle"></i> Olá, ${usuarioNome}
                <button class="btn-sair" onclick="logout()">Sair</button>
            </span>
        `;
    }
}

function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
}

async function carregarProdutos() {
    try {
        const response = await fetch(`${API_URL}/produtos?status=aprovado`);
        const data = await response.json();

        produtosOriginais = data.produtos || [];
        aplicarFiltros();
    } catch (error) {
        document.getElementById('produtos').innerHTML = '<div class="loading">❌ Erro ao carregar produtos</div>';
        console.error('Erro:', error);
    }
}

function aplicarFiltros() {
    let produtos = [...produtosOriginais];

    if (termoBusca) {
        produtos = produtos.filter(p => p.nome.toLowerCase().includes(termoBusca.toLowerCase()));
    }

    document.getElementById('total-produtos').textContent = produtos.length;
    renderizarProdutos(produtos);
}

function renderizarProdutos(produtos) {
    const container = document.getElementById('produtos');

    if (!produtos.length) {
        container.innerHTML = '<div class="loading">😢 Nenhum produto disponível no momento.</div>';
        return;
    }

    container.innerHTML = '<div class="produtos-grid"></div>';
    const grid = container.querySelector('.produtos-grid');

    produtos.forEach(produto => {
        const card = document.createElement('div');
        card.className = 'produto-card';
        card.innerHTML = `
            <h3>${produto.nome}</h3>
            <div class="categoria">${produto.categoria}</div>
            <div class="preco">R$ ${produto.valor_exposicao.toFixed(2)}</div>
            <div class="input-group">
                <input type="number" id="valor-${produto.id}" placeholder="Sua oferta (R$)" step="0.01">
                <button class="btn-ofertar" onclick="fazerOferta(${produto.id})">Ofertar</button>
            </div>
            <div id="msg-${produto.id}" class="msg"></div>
        `;
        grid.appendChild(card);
    });
}

function filtrarProdutos() {
    termoBusca = document.getElementById('searchInput').value;
    aplicarFiltros();
}

async function fazerOferta(produtoId) {
    const tokenAtual = localStorage.getItem('access_token');

    if (!tokenAtual) {
        alert('Faça login para fazer uma oferta!');
        window.location.href = 'login.html';
        return;
    }

    const input = document.getElementById(`valor-${produtoId}`);
    const valor = parseFloat(input.value);
    const msgDiv = document.getElementById(`msg-${produtoId}`);

    if (!valor || valor <= 0) {
        msgDiv.innerHTML = 'Digite um valor válido!';
        msgDiv.style.color = 'red';
        setTimeout(() => msgDiv.innerHTML = '', 3000);
        return;
    }

    try {
        const response = await fetch(`${API_URL}/ofertas`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${tokenAtual}`
            },
            body: JSON.stringify({ produto_id: produtoId, valor: valor })
        });

        const data = await response.json();

        if (response.ok) {
            msgDiv.innerHTML = `✅ ${data.mensagem}`;
            msgDiv.style.color = '#2e7d32';
            input.value = '';
            carregarProdutos();
        } else {
            msgDiv.innerHTML = `❌ ${data.detail || 'Erro ao fazer oferta'}`;
            msgDiv.style.color = 'red';
        }
    } catch (error) {
        msgDiv.innerHTML = '❌ Erro de conexão';
        msgDiv.style.color = 'red';
    }

    setTimeout(() => msgDiv.innerHTML = '', 5000);
}

atualizarTopBar();
carregarProdutos();
</script>

</body>
</html>
