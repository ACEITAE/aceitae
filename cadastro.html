<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACEITAÊ - Cadastro</title>
    <style>
        body { font-family: Arial; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 12px; width: 400px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; margin-top: 8px; padding: 8px; }
        button { background: #00C853; color: white; border: none; cursor: pointer; border-radius: 6px; }
        .tipo { display: flex; gap: 10px; margin: 10px 0; }
        .tipo button { background: #eee; color: black; }
        .tipo .ativo { background: #1A237E; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="card">
    <h2>ACEITAÊ - Cadastro</h2>
    <div class="tipo">
        <button type="button" id="btnComprador" class="ativo">Comprador</button>
        <button type="button" id="btnVendedor">Vendedor</button>
    </div>
    <form id="cadastroForm">
        <input type="text" id="nome" placeholder="Nome completo" required>
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="tel" id="telefone" placeholder="Telefone (11 99999-9999)" required>
        <input type="password" id="senha" placeholder="Senha" required>
        <div id="camposVendedor" class="hidden">
            <input type="text" id="cpf" placeholder="CPF">
            <input type="text" id="pix" placeholder="Chave PIX">
            <input type="text" id="endereco" placeholder="Endereço completo">
        </div>
        <button type="submit">Cadastrar</button>
    </form>
    <p id="mensagem"></p>
</div>

<script>
const API_URL = 'https://aceitae-api-v2.onrender.com';

let tipo = 'comprador';
document.getElementById('btnComprador').onclick = () => {
    tipo = 'comprador';
    document.getElementById('btnComprador').classList.add('ativo');
    document.getElementById('btnVendedor').classList.remove('ativo');
    document.getElementById('camposVendedor').classList.add('hidden');
};
document.getElementById('btnVendedor').onclick = () => {
    tipo = 'vendedor';
    document.getElementById('btnVendedor').classList.add('ativo');
    document.getElementById('btnComprador').classList.remove('ativo');
    document.getElementById('camposVendedor').classList.remove('hidden');
};

document.getElementById('cadastroForm').onsubmit = async (e) => {
    e.preventDefault();

    const payload = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        telefone: document.getElementById('telefone').value,
        senha: document.getElementById('senha').value,
        tipo: tipo,
        cpf: document.getElementById('cpf').value || null,
        pix: document.getElementById('pix').value || null,
        endereco: document.getElementById('endereco').value || null
    };

    const response = await fetch(`${API_URL}/cadastrar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });

    const msg = document.getElementById('mensagem');
    if (response.ok) {
        const data = await response.json();
        msg.style.color = 'green';
        msg.innerText = data.mensagem;
        setTimeout(() => location.href = 'login.html', 1500);
    } else {
        const error = await response.json();
        msg.style.color = 'red';
        msg.innerText = error.detail || 'Erro ao cadastrar';
    }
};
</script>
</body>
</html>
