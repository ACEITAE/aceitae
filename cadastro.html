<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACEITAÊ - Cadastro</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Arial;
    background: linear-gradient(135deg, #1A237E, #283593);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card {
    background:white;
    padding:30px;
    border-radius:15px;
    width:100%;
    max-width:500px;
}

.tipo-btn {
    border:1px solid #ccc;
    padding:10px;
    cursor:pointer;
    text-align:center;
}

.tipo-btn.active {
    background:#00C853;
    color:white;
}

input {
    width:100%;
    padding:10px;
    margin-top:5px;
}

button {
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#00C853;
    color:white;
    border:none;
}

.mensagem { margin-top:10px; }

</style>
</head>

<body>

<div class="card">

<h2>Cadastro ACEITAÊ</h2>

<div style="display:flex; gap:10px; margin-bottom:15px;">
    <div class="tipo-btn" data-tipo="comprador">Comprar</div>
    <div class="tipo-btn" data-tipo="vendedor">Vender</div>
    <div class="tipo-btn" data-tipo="ambos">Ambos</div>
</div>

<form id="form">

<input id="nome" placeholder="Nome" required>
<input id="email" type="email" placeholder="Email" required>
<input id="telefone" placeholder="Telefone" required>
<input id="doc" placeholder="CPF/CNPJ">
<input id="senha" type="password" placeholder="Senha" required>

<input id="pix" placeholder="PIX (se vendedor)">

<input id="cep" placeholder="CEP">
<button type="button" id="buscarCep">Buscar CEP</button>

<input id="logradouro" placeholder="Rua" readonly>
<input id="bairro" placeholder="Bairro" readonly>
<input id="cidade" placeholder="Cidade" readonly>
<input id="estado" placeholder="Estado" readonly>
<input id="numero" placeholder="Número">

<button type="submit">Cadastrar</button>

</form>

<div id="msg" class="mensagem"></div>

</div>

<script>

const API_URL = "https://aceitae-api.onrender.com";

// ================= TIPO USUARIO =================
document.querySelectorAll('.tipo-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
});

// ================= CEP =================
document.getElementById('buscarCep').onclick = async () => {

    let cep = document.getElementById('cep').value.replace(/\D/g,'');

    if (cep.length !== 8) {
        alert('CEP inválido');
        return;
    }

    const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    const data = await res.json();

    if (data.erro) return alert('CEP não encontrado');

    document.getElementById('logradouro').value = data.logradouro;
    document.getElementById('bairro').value = data.bairro;
    document.getElementById('cidade').value = data.localidade;
    document.getElementById('estado').value = data.uf;
};

// ================= CADASTRO =================
document.getElementById('form').onsubmit = async (e) => {

    e.preventDefault();

    const tipoBtn = document.querySelector('.tipo-btn.active');
    if (!tipoBtn) return alert('Escolha o tipo de usuário');

    const tipo = tipoBtn.dataset.tipo;

    const nome = nomeInput.value;
    const email = emailInput.value;
    const telefone = telefoneInput.value;
    const senha = senhaInput.value;
    const doc = docInput.value;

    if (senha.length < 6) return alert('Senha mínima 6 caracteres');

    if ((tipo === 'vendedor' || tipo === 'ambos') && !doc)
        return alert('CPF obrigatório');

    const endereco = `${logradouro.value}, ${numero.value} - ${bairro.value}, ${cidade.value} - ${estado.value}`;

    const dados = {
        nome,
        email,
        telefone,
        senha,
        tipo,
        cpf: doc || null,
        endereco,
        pix: pix.value || null
    };

    const msg = document.getElementById('msg');

    try {

        // CADASTRO
        const res = await fetch(`${API_URL}/cadastrar`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(dados)
        });

        if (!res.ok) throw new Error('Erro cadastro');

        msg.innerHTML = "✅ Cadastro ok... logando";

        // LOGIN AUTOMÁTICO
        const login = await fetch(`${API_URL}/login`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email, senha })
        });

        const data = await login.json();

        // 🔥 ESSENCIAL
        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('usuario_id', data.usuario_id);
        localStorage.setItem('usuario_nome', data.nome);
        localStorage.setItem('usuario_tipo', data.tipo);

        msg.innerHTML = "🚀 Entrando...";

        setTimeout(()=>{
            window.location.href = 'index.html';
        },1000);

    } catch(e){
        msg.innerHTML = "❌ " + e.message;
    }
};

</script>

</body>
</html>
