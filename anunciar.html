<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACEITAÊ - Anunciar Produto</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#1A237E,#283593);
    color:#333;
}

.container {
    max-width: 600px;
    margin: auto;
    padding:20px;
}

.card {
    background:white;
    padding:30px;
    border-radius:15px;
}

input, textarea {
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:12px;
    background:#00C853;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.preview img {
    width:80px;
    margin:5px;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Anunciar Produto</h2>

<form id="form">

<input type="text" id="nome" placeholder="Nome do produto" required>
<textarea id="descricao" placeholder="Descrição" required></textarea>

<input type="text" id="categoria" placeholder="Categoria" required>
<input type="number" id="valor" placeholder="Valor pretendido" required>

<input type="file" id="fotos" multiple>

<div class="preview" id="preview"></div>

<button type="submit">Anunciar</button>

</form>

<div id="msg"></div>

</div>
</div>

<script>
const API = "https://aceitae-api-v2.onrender.com";
const token = localStorage.getItem("access_token");

if(!token){
    alert("Faça login primeiro");
    window.location.href = "login.html";
}

// preview imagens
document.getElementById("fotos").addEventListener("change", e=>{
    const preview = document.getElementById("preview");
    preview.innerHTML = "";
    Array.from(e.target.files).forEach(file=>{
        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        preview.appendChild(img);
    });
});

// upload imagem
async function upload(file){
    const formData = new FormData();
    formData.append("arquivo", file);

    const res = await fetch(API + "/upload-foto",{
        method:"POST",
        headers:{
            "Authorization":"Bearer "+token
        },
        body:formData
    });

    const data = await res.json();

    if(!res.ok) throw new Error(data.detail);

    return data.url;
}

// submit
document.getElementById("form").addEventListener("submit", async e=>{
    e.preventDefault();

    const msg = document.getElementById("msg");
    msg.innerHTML = "Enviando...";

    try{
        const files = document.getElementById("fotos").files;

        let urls = [];

        for(let f of files){
            const url = await upload(f);
            urls.push(url);
        }

        const body = {
            nome: document.getElementById("nome").value,
            descricao: document.getElementById("descricao").value,
            categoria: document.getElementById("categoria").value,
            valor_pretendido: parseFloat(document.getElementById("valor").value),
            fotos: urls
        };

        const res = await fetch(API + "/produtos",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer "+token
            },
            body: JSON.stringify(body)
        });

        const data = await res.json();

        if(res.ok){
            msg.innerHTML = "✅ Produto criado!";
            setTimeout(()=> window.location.href="vendedor.html",1500);
        } else {
            msg.innerHTML = "❌ " + data.detail;
        }

    } catch(err){
        msg.innerHTML = "Erro: " + err.message;
    }
});
</script>

</body>
</html>
