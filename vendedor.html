<script>
const API_URL = 'https://aceitae-api.onrender.com';

const TOKEN = localStorage.getItem('access_token');
const VENDEDOR_ID = localStorage.getItem('usuario_id');
const VENDEDOR_NOME = localStorage.getItem('usuario_nome');

if (!TOKEN) {
    alert('Faça login novamente');
    window.location.href = 'login.html';
}

// Header
if (VENDEDOR_NOME) {
    document.getElementById('userInfo').innerHTML = `
        <span class="user-name">
            <i class="fas fa-user-circle"></i> Olá, ${VENDEDOR_NOME}
        </span>
        <span class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Sair
        </span>
    `;
}

function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
}

// ==================================================
// 🔥 BUSCAR PRODUTOS DO VENDEDOR (FILTRADO FRONT)
// ==================================================
async function buscarProdutos() {
    const res = await fetch(`${API_URL}/produtos`, {
        headers: {
            'Authorization': `Bearer ${TOKEN}`
        }
    });

    const data = await res.json();

    return data.produtos.filter(p => p.vendedor_id == VENDEDOR_ID);
}

// ==================================================
// 🔥 BUSCAR OFERTAS
// ==================================================
async function buscarOfertas() {
    const produtos = await buscarProdutos();

    const ids = produtos.map(p => p.id);

    const res = await fetch(`${API_URL}/ofertas`, {
        headers: {
            'Authorization': `Bearer ${TOKEN}`
        }
    });

    const data = await res.json();

    return data.ofertas.filter(o => ids.includes(o.produto_id));
}

// ==================================================
// CARREGAR DASHBOARD
// ==================================================
async function carregarDadosVendedor() {
    try {
        const produtos = await buscarProdutos();
        const ofertas = await buscarOfertas();

        document.getElementById('total-produtos').textContent = produtos.length;
        document.getElementById('total-ofertas').textContent = ofertas.length;

        const pendentes = ofertas.filter(o => o.status === 'pendente').length;
        document.getElementById('ofertas-pendentes').textContent = pendentes;

        renderizarOfertas(ofertas, produtos);

    } catch (error) {
        console.error(error);
        document.getElementById('ofertas-container').innerHTML = 'Erro ao carregar';
    }
}

// ==================================================
// RENDER
// ==================================================
function renderizarOfertas(ofertas, produtos) {
    const container = document.getElementById('ofertas-container');

    if (!ofertas.length) {
        container.innerHTML = '<div class="sem-ofertas">Nenhuma oferta ainda</div>';
        return;
    }

    let html = '<div class="ofertas-grid">';

    ofertas.forEach(oferta => {
        const produto = produtos.find(p => p.id === oferta.produto_id);

        const comissao = oferta.valor * 0.10;
        const liquido = oferta.valor - comissao;

        html += `
            <div class="oferta-card">
                <div class="oferta-status">${oferta.status}</div>

                <div class="oferta-info">
                    <div class="produto-nome">${produto?.nome || ''}</div>

                    <div class="detalhes-oferta">
                        <div>Valor: R$ ${oferta.valor.toFixed(2)}</div>
                        <div>Você recebe: R$ ${liquido.toFixed(2)}</div>
                    </div>

                    ${oferta.status === 'pendente' ? `
                        <button onclick="responder(${oferta.id}, 'ACEITAÊ')">ACEITAÊ</button>
                        <button onclick="responder(${oferta.id}, 'RECUSAR')">Recusar</button>
                    ` : ''}
                </div>
            </div>
        `;
    });

    html += '</div>';
    container.innerHTML = html;
}

// ==================================================
// RESPONDER OFERTA
// ==================================================
async function responder(id, acao) {
    const res = await fetch(`${API_URL}/ofertas/${id}/responder?acao=${acao}`, {
        method: 'PUT',
        headers: {
            'Authorization': `Bearer ${TOKEN}`
        }
    });

    const data = await res.json();
    alert(data.mensagem);

    carregarDadosVendedor();
}

// INIT
carregarDadosVendedor();
</script>
